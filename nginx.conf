server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; frame-ancestors 'self'" always;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/font-woff2;

    location = /healthz { access_log off; add_header Content-Type text/plain; return 200 "ok\n"; }

    location ~* \.(css|js|svg|woff2?|ttf|png|jpe?g|gif|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / { try_files $uri $uri/ /index.html; }
}
